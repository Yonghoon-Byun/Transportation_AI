    provincial_park:
      description: "도립공원, 군립공원"
      restriction: "통과 최소화, 환경부·지자체 협의 필요"
      allowed: "conditional"
      # TODO: 도립공원 유형별 행위허가 기준 확인 필요

    wetland_protection:
      description: "습지보호지역"
      # 근거: 습지보전법 제8조
      restriction: "통과 금지, 람사르 습지 포함"
      allowed: false

    wildlife_protection:
      description: "야생생물 보호구역"
      # 근거: 야생생물 보호 및 관리에 관한 법률 제27조
      restriction: "통과 최소화, 생태통로 설치 의무"
      allowed: "conditional"
      mitigation:
        - "생태통로 설치 (폭 최소 20m 이상)"
        - "방음·방진 시설"
        - "조명 차단"

    greenbelts:
      description: "개발제한구역 (그린벨트)"
      # 근거: 개발제한구역의 지정 및 관리에 관한 특별조치법
      restriction: "통과 가능, 국토부 장관 허가 필요"
      allowed: "conditional"
      # TODO: 개발제한구역 훼손 면적 최소화 원칙 적용 필요

    water_source_protection:
      description: "상수원보호구역"
      # 근거: 수도법 제7조
      restriction: "통과 원칙적 불가, 환경부 협의 필요"
      allowed: "conditional"
      mitigation:
        - "방수 방호 구조물 설치"
        - "터널 통과 검토"
        - "오염 방지 대책 수립"

    military_zone:
      description: "군사시설보호구역"
