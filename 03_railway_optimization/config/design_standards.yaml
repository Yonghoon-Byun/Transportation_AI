      # 근거: 농지법 제28조
      restriction: "통과 가능, 농림부 협의 필요"
      allowed: "conditional"
      mitigation:
        - "대체농지 조성"
        - "농업기반시설 보호"

  noise_vibration_limits:
    description: "철도 소음·진동 기준"
    # 근거: 소음·진동관리법 시행규칙 별표8 (철도소음 기준)
