        nighttime:        # 22:00~06:00
          value: 65       # dB(A)
          unit: "dB(A)"
        # 근거: 소음·진동관리법 시행규칙 별표8
      school_hospital:
        daytime:
          value: 65       # dB(A)
          unit: "dB(A)"
        nighttime:
          value: 60       # dB(A)
          unit: "dB(A)"
    vibration_standard:
      residential:
        daytime:
          value: 65       # dB(V)
          unit: "dB(V)"
        nighttime:
          value: 60       # dB(V)
          unit: "dB(V)"
        # 근거: 소음·진동관리법 시행규칙 별표8
      # TODO: 진동 기준 고속철도 별도 기준 적용 여부 확인 필요


# -----------------------------------------------------------------------------
# 6. 최적화 파라미터 (알고리즘 내부 설정)
# -----------------------------------------------------------------------------
optimization:
  description: "선형 최적화 알고리즘 파라미터 설정"

  objective_weights:
    description: "목적함수 가중치 (합계 1.0)"
    construction_cost: 0.50    # 공사비
    land_compensation: 0.25    # 용지보상비
    environmental_impact: 0.15 # 환경영향 (정성적 점수화)
    operational_efficiency: 0.10 # 운영효율 (구배, 곡선 등)
    # TODO: 사업별 정책 우선순위에 따라 가중치 조정 필요

  constraint_penalties:
    description: "제약조건 위반 시 패널티 (목적함수 가중치)"
    protected_area_violation: 1000000  # 보호구역 통과 시 대형 패널티
    design_standard_violation: 500000  # 설계기준 위반
    setback_violation: 100000          # 이격거리 부족
    # TODO: 패널티 스케일링 및 연속 패널티 함수 설계 필요

  algorithm:
    # TODO: 알고리즘 선택 및 파라미터 튜닝 필요
    primary: "genetic_algorithm"       # 유전 알고리즘
    fallback: "simulated_annealing"    # 시뮬레이티드 어닐링
    max_iterations: 10000
    population_size: 100               # GA 개체군 크기
    convergence_tolerance: 0.001       # 수렴 기준
