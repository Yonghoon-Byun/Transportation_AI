# =============================================================================
# 철도설계기준 파라미터 (Korean Railway Design Standards)
# =============================================================================
# 참고 규정:
#   - 철도의 건설기준에 관한 규정 (국토교통부고시, 이하 "건설기준규정")
#   - KDS 47 00 00 철도 설계기준 (한국건설기준코드)
#   - KR C-02060 선로 설계기준 (한국철도시설공단, 이하 "KR Code")
#   - 도시철도 설계기준 (국토교통부고시)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 철도 종류별 설계기준
# -----------------------------------------------------------------------------
railway_types:

  # ---------- 고속철도 (High-Speed Railway) ----------
  high_speed:
    description: "고속철도 - 설계속도 200km/h 초과"
    # 근거: 건설기준규정 제3조, KDS 47 30 15

    design_speed:
      value: 350          # km/h
      unit: "km/h"
      note: "KTX 기준 영업최고속도 300km/h, 설계속도 350km/h"
      # 근거: 건설기준규정 별표1, KR C-02060 2.1.1

    minimum_curve_radius:
      main_track:
        value: 7000       # m
        unit: "m"
        note: "V=350km/h 기준, 캔트 180mm 적용 시 최소값"
        # 근거: KDS 47 30 15 4.1, 건설기준규정 제6조
        # TODO: 선형설계 시 실제 캔트 적용값에 따라 재산정 필요
      sub_track:          # 부본선/측선
        value: 2500       # m
        unit: "m"
        # 근거: KR C-02060 Table 2.2

    maximum_gradient:
      main_track:
        value: 25         # ‰
        unit: "‰"
        note: "연속구간 기준, 가속력 보정구간 35‰까지 완화 가능"
        # 근거: 건설기준규정 제9조, KDS 47 30 15 4.3
      side_track:         # 측선
        value: 15         # ‰
        unit: "‰"
        # 근거: 건설기준규정 제9조

    minimum_transition_curve_length:
      value: 130          # m
      unit: "m"
      note: "V=350km/h, R=7000m 기준 클로소이드 적용"
      # 근거: KDS 47 30 15 4.2, KR C-02060 3.2.1
      # TODO: 실제 캔트 변화율(55mm/s) 적용하여 검토 필요

    minimum_vertical_curve_radius:
      crest:              # 볼록 종곡선
        value: 25000      # m
        unit: "m"
        # 근거: KDS 47 30 15 4.4
      sag:                # 오목 종곡선
        value: 15000      # m
        unit: "m"
        # 근거: KDS 47 30 15 4.4

    cant:
      maximum:
        value: 180        # mm
        unit: "mm"
        # 근거: 건설기준규정 제7조, KDS 47 30 15 4.1
      cant_deficiency_max:  # 최대 부족캔트
        value: 80         # mm
        unit: "mm"
        # 근거: KDS 47 30 15 4.1
        # TODO: 속도 향상 구간 조건부 130mm까지 완화 적용 여부 검토

    gauge:
      value: 1435         # mm (표준궤간)
      unit: "mm"
      # 근거: 건설기준규정 제4조

    structure_gauge:       # 건축한계
      width:
        value: 4.6        # m (궤도 중심으로부터 좌우)
        unit: "m"
        # 근거: KR C-02060 부록A, KDS 47 30 00
        # TODO: 터널 내부 건축한계 별도 적용 필요
      height:
        value: 6.4        # m (레일면 상부)
        unit: "m"
        # 근거: KR C-02060 부록A


  # ---------- 일반철도 (Conventional Railway) ----------
  conventional:
    description: "일반철도 - 설계속도 200km/h 이하"
    # 근거: 건설기준규정 제3조, KDS 47 30 10

    design_speed:
      value: 200          # km/h (최고등급 기준)
      unit: "km/h"
      note: "설계속도 등급: 70/90/120/150/200km/h"
      # 근거: 건설기준규정 별표1

    minimum_curve_radius:
      main_track:
        # 설계속도별 최소 곡선반경 (단위: m)
        by_speed:
          v70:  400       # 근거: 건설기준규정 별표2
          v90:  600
          v120: 1200
          v150: 1600
          v200: 3000
        unit: "m"
        # 근거: KDS 47 30 10 4.1, 건설기준규정 제6조
      sub_track:
        value: 150        # m (부본선/측선 공통)
        unit: "m"
        # 근거: 건설기준규정 제6조 별표2

    maximum_gradient:
      main_track:
        by_speed:
          v70:  25        # ‰
          v90:  25
          v120: 25
          v150: 15
          v200: 15
        unit: "‰"
        # 근거: 건설기준규정 제9조 별표4
      side_track:
        value: 15         # ‰
        unit: "‰"
        # 근거: 건설기준규정 제9조

    minimum_transition_curve_length:
      by_speed:
        v70:  30          # m
        v90:  50
        v120: 70
        v150: 90
        v200: 110
      unit: "m"
      # 근거: KDS 47 30 10 4.2, KR C-02060 3.2.1

    minimum_vertical_curve_radius:
      crest:
        by_speed:
          v70:  2000      # m
          v90:  4000
          v120: 7000
          v150: 12000
          v200: 18000
        unit: "m"
        # 근거: KDS 47 30 10 4.4
      sag:
        by_speed:
          v70:  1500      # m
          v90:  2500
          v120: 4000
          v150: 7000
          v200: 10000
        unit: "m"
        # 근거: KDS 47 30 10 4.4

    cant:
      maximum:
        value: 160        # mm
        unit: "mm"
        # 근거: 건설기준규정 제7조
      cant_deficiency_max:
        value: 100        # mm
        unit: "mm"
        # 근거: 건설기준규정 제7조, KDS 47 30 10 4.1

    gauge:
      value: 1435         # mm (표준궤간)
      unit: "mm"
      # 근거: 건설기준규정 제4조

    structure_gauge:
      width:
        value: 4.3        # m
        unit: "m"
        # 근거: KDS 47 30 00 건축한계 일반철도 기준
      height:
        value: 6.0        # m
        unit: "m"
        # 근거: KDS 47 30 00


  # ---------- 도시철도 (Urban Railway / Metro) ----------
  urban:
    description: "도시철도 - 지하철, 경전철 포함"
    # 근거: 도시철도 건설기준에 관한 규정, KDS 47 30 20

    design_speed:
      heavy_rail:         # 중전철 (지하철)
        value: 110        # km/h
        unit: "km/h"
        # 근거: 도시철도 설계기준 2.1
      light_rail:         # 경전철 (LRT)
        value: 80         # km/h
        unit: "km/h"
        # 근거: 도시철도 설계기준 2.1

    minimum_curve_radius:
      main_track:
        heavy_rail:
          value: 200      # m
          unit: "m"
          note: "지하 본선 기준, 차량기지 내 60m까지 허용"
          # 근거: 도시철도 설계기준, KDS 47 30 20 4.1
          # TODO: 경량전철 차량별 최소 곡선반경 별도 확인 필요
        light_rail:
          value: 60       # m
          unit: "m"
          # 근거: 도시철도 설계기준 4.1
      sub_track:
        value: 100        # m
        unit: "m"
        # 근거: 도시철도 설계기준

    maximum_gradient:
      main_track:
        heavy_rail:
          value: 35       # ‰
          unit: "‰"
          # 근거: 도시철도 설계기준, KDS 47 30 20 4.3
        light_rail:
          value: 60       # ‰  (급구배 노선 적용)
          unit: "‰"
          # 근거: 도시철도 설계기준 4.3
          # TODO: LRT 차종별 최대 구배 재확인 필요
      side_track:
        value: 10         # ‰
        unit: "‰"

    minimum_transition_curve_length:
      heavy_rail:
        value: 30         # m
        unit: "m"
        # 근거: KDS 47 30 20 4.2
      light_rail:
        value: 20         # m
        unit: "m"
        # 근거: 도시철도 설계기준

    minimum_vertical_curve_radius:
      crest:
        heavy_rail:
          value: 3000     # m
          unit: "m"
          # 근거: KDS 47 30 20 4.4
        light_rail:
          value: 1000     # m
          unit: "m"
      sag:
        heavy_rail:
          value: 2000     # m
          unit: "m"
          # 근거: KDS 47 30 20 4.4
        light_rail:
          value: 800      # m
          unit: "m"

    cant:
      maximum:
        value: 105        # mm
        unit: "mm"
        # 근거: 도시철도 설계기준
      cant_deficiency_max:
        value: 80         # mm
        unit: "mm"
        # 근거: 도시철도 설계기준

    gauge:
      heavy_rail:
        value: 1435       # mm (표준궤간)
        unit: "mm"
        # 근거: 건설기준규정 제4조
      light_rail:
        value: 1435       # mm (표준궤간 기본, 노선별 상이)
        unit: "mm"
        note: "경전철 차종에 따라 1000mm, 1067mm 등 상이"
        # TODO: 사업별 차량 제원 확인 필요

    structure_gauge:
      width:
        heavy_rail:
          value: 4.2      # m
          unit: "m"
          # 근거: 도시철도 설계기준 건축한계
      height:
        heavy_rail:
          value: 5.5      # m
          unit: "m"
          # 근거: 도시철도 설계기준 건축한계


# -----------------------------------------------------------------------------
# 2. 구조물 설계기준
# -----------------------------------------------------------------------------
structures:

  tunnel:
    description: "철도 터널 설계기준"
    # 근거: KDS 27 (터널설계기준), KR C-08080

    minimum_cover_depth:
      urban:
        value: 1.0        # D (터널 직경 배수)
        unit: "D"
        note: "연약지반 등 지반조건에 따라 증가"
        # 근거: KDS 27 90 00, KR C-08080
        # TODO: 도심 천층 구간 최소 토피고 지반조건별 세부 기준 확인 필요
      mountain:
        value: 0.5        # D
        unit: "D"
        # 근거: KDS 27 90 00
    minimum_cover_depth_absolute:
      value: 10           # m (절대 최솟값)
      unit: "m"
      note: "지반 조건 무관 절대 최소 토피고"
      # TODO: 국내 실적 및 기준 재검토 필요

    minimum_clearance_area:
      # 건축한계 + 여유폭 고려한 내공 단면
      high_speed_double_track:
        value: 107        # m²
        unit: "m²"
        note: "고속철도 복선, 공기압 기준 검토 필요"
        # 근거: KR C-08080, 고속철도 터널 설계기준
        # TODO: 열차 공기압 피로 검토 반영 필요
      conventional_double_track:
        value: 57         # m²
        unit: "m²"
        # 근거: KR C-08080
      urban_double_track:
        value: 42         # m²
        unit: "m²"
        # 근거: 도시철도 터널 설계기준
        # TODO: 차량 제원 및 설비 설치 공간에 따라 조정 필요

    portal_protection_slope:
      value: 1.0          # H:V
      unit: "H:V"
      # 근거: KDS 27 90 00

  bridge:
    description: "철도 교량 설계기준"
    # 근거: KDS 24 (교량설계기준), KR C-08030

    maximum_span:
      prestressed_concrete:
        value: 50         # m
        unit: "m"
        # 근거: KR C-08030, 일반적인 PSC 거더 경간
        # TODO: 구조 검토에 따라 증가 가능, 표준설계 적용 기준 확인
      steel:
        value: 100        # m
        unit: "m"
        note: "강박스 거더 기준, 특수교량 제외"
        # 근거: KR C-08030
      special_bridge:     # 장대교량 (사장교, 현수교 등)
        value: 9999       # m (제한 없음, 별도 검토)
        unit: "m"
        note: "별도 설계 및 허가 필요"

    maximum_gradient:
      value: 25           # ‰
      unit: "‰"
      note: "고속철도 교량 15‰ 권장"
      # 근거: KR C-08030, 건설기준규정 준용
      # TODO: 교량 상부 신축이음 영향 검토 필요

    minimum_freeboard:    # 최소 여유고 (계획홍수위 상부)
      general:
        value: 0.6        # m
        unit: "m"
        # 근거: 하천설계기준, KR C-08030
      major_river:
        value: 1.2        # m
        unit: "m"
        # 근거: 하천설계기준

    skew_angle_limit:     # 사교각 제한
      value: 60           # degrees (최대 사각)
      unit: "degrees"
      # 근거: KR C-08030
      # TODO: 표준설계 적용 가능 사각 범위 재확인

  cut_and_cover:          # 개착 구조물
    description: "개착식 지하구조물 설계기준"
    # 근거: KDS 21 (흙막이설계기준), KR C-08080

    maximum_excavation_depth:
      value: 40           # m
      unit: "m"
      note: "흙막이 공법별 상이, 일반적인 최대 깊이"
      # 근거: KDS 21 90 00
      # TODO: 지반 조건 및 지하수위에 따른 공법 선정 기준 보완 필요

    minimum_slab_thickness:
      top_slab:
        value: 0.4        # m
        unit: "m"
        # 근거: 철근콘크리트 설계기준, 실적 기준
      side_wall:
        value: 0.5        # m
        unit: "m"
      bottom_slab:
        value: 0.5        # m
        unit: "m"

    dewatering_required_depth:  # 지하수위 이하 굴착 시 배수 처리 기준
      value: 1.0          # m (지하수위 이하)
      unit: "m"
      # 근거: KDS 21 90 00


# -----------------------------------------------------------------------------
# 3. 이격거리 기준
# -----------------------------------------------------------------------------
setback_distances:
  description: "철도 노선 계획 시 주요 시설물 이격거리 기준"
  # 근거: 철도안전법, 소음·진동관리법, 문화재보호법, 환경영향평가법

  noise_sensitive_facilities:
    # 근거: 소음·진동관리법, 환경영향평가서 작성 기준
    school:
      description: "학교(유·초·중·고·대학교)"
      setback:
        high_speed:
          value: 200      # m
          unit: "m"
          # 근거: 소음 65dB(A) 이하 기준 추정 이격거리
          # TODO: 방음벽 등 저감시설 설치 시 완화 가능, 실측 소음예측 검토 필요
        conventional:
          value: 150      # m
          unit: "m"
        urban:
          value: 100      # m
          unit: "m"
      noise_limit_db: 65  # dB(A), 주간 기준
      # 근거: 소음·진동관리법 시행규칙 별표8

    hospital:
      description: "병원, 요양원"
      setback:
        high_speed:
          value: 200      # m
          unit: "m"
          # TODO: 소음예측 및 방음시설 계획에 따라 조정
        conventional:
          value: 150      # m
          unit: "m"
        urban:
          value: 100      # m
          unit: "m"
      noise_limit_db: 60  # dB(A), 주간 기준
      # 근거: 소음·진동관리법 시행규칙 별표8

  residential_area:
    description: "주거지역"
    setback:
      high_speed:
        value: 100        # m
        unit: "m"
        # 근거: 소음 70dB(A) 이하 기준, 방음벽 설치 조건
        # TODO: 지형 및 방음시설에 따른 실측 이격거리 검토 필요
      conventional:
        value: 80         # m
        unit: "m"
      urban:
        value: 50         # m
        unit: "m"
    noise_limit_db: 70    # dB(A), 주간 기준
    # 근거: 소음·진동관리법 시행규칙 별표8

  cultural_heritage:
    description: "문화재 보호구역"
    # 근거: 문화재보호법 제13조, 문화재청 고시
    setback:
      national_treasure:  # 국보, 보물
        value: 100        # m
        unit: "m"
        note: "문화재청 현상변경 허가 기준 (통상 500m 이내 심의)"
        # TODO: 실제 문화재별 현상변경허용기준 구역 확인 필요 (관보 고시)
      historic_site:      # 사적
        value: 200        # m
        unit: "m"
        # TODO: 사적 현상변경허용기준 개별 확인 필요
      natural_monument:   # 천연기념물
        value: 100        # m
        unit: "m"
    review_required_distance: 500  # m 이내 문화재청 협의 의무
    # 근거: 문화재보호법 제13조

  water_source:
    description: "상수원 보호구역"
    # 근거: 수도법 제7조
    setback:
      value: 300          # m
      unit: "m"
      note: "보호구역 경계로부터 이격, 오염 방지 대책 필요"
      # TODO: 상수원보호구역 통과 시 환경부 협의 기준 별도 확인

  military_facility:
    description: "군사시설"
    # 근거: 군사기지 및 군사시설 보호법
