  environmental_impact_assessment:
    description: "환경영향평가 대상 기준"
    # 근거: 환경영향평가법 시행령 별표3
    railway_length_threshold:
      urban:
        value: 4          # km 이상
        unit: "km"
        note: "도시지역 또는 면적 25만m² 이상"
        # 근거: 환경영향평가법 시행령 별표3 철도 항목
      non_urban:
        value: 10         # km 이상
        unit: "km"
        note: "비도시지역 신설 철도"
        # 근거: 환경영향평가법 시행령 별표3
    required_studies:
      - "소음·진동 영향 예측"
      - "생태계 조사 (동·식물상)"
      - "지형·지질 조사"
      - "수환경 영향 조사"
      - "경관 영향 분석"
      - "토지이용 변화 분석"
      - "사회·경제 영향 분석"

  protected_areas:
    description: "보호구역 유형별 통과 제한"

    national_park:
      description: "국립공원"
      # 근거: 자연공원법 제23조
      restriction: "원칙적 통과 불가, 공원위원회 심의 필요"
      allowed: false
      exception: "불가피 시 환경부 장관 허가 및 별도 심의"
